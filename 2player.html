<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ═══════════════════════════════════════════════════════════
   MODE  –  always "coop" (local 2-player split-screen)
═══════════════════════════════════════════════════════════ */
let gameMode = "coop";

/* INPUT */
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup",   e => keys[e.key] = false);

/* SHIP (P1) */
const ship = { vx:0, vy:0, angle:0, thrust:0.1, stuck:true };

let lives = 10;
let kills = 0;
let dead = false;

/* MONEY & MAX LIVES */
let money = 0;
let maxLives = 10;

/* SHOP */
let shopOpen = false;
let upgradeTripleShot = false;
let upgradeFireRate  = false;
let upgradeSpeedBoost = false;
let upgradeMaxHP15   = false;
let upgradeMaxHP20   = false;

const SHOP_ITEMS = [
  { key:"1", label:"Triple Shot",    cost:40,  id:"tripleShot" },
  { key:"2", label:"Max HP → 15",    cost:25,  id:"maxHP15"    },
  { key:"3", label:"Max HP → 20",    cost:60,  id:"maxHP20"    },
  { key:"4", label:"Fire Rate +",    cost:20,  id:"fireRate"   },
  { key:"5", label:"Speed Boost",    cost:15,  id:"speedBoost" }
];

function handleShopPurchase(key){
  if(!shopOpen || dead) return;
  const item = SHOP_ITEMS.find(i => i.key === key);
  if(!item) return;
  if(money < item.cost) return;
  if(item.id === "tripleShot"  && upgradeTripleShot)  return;
  if(item.id === "maxHP15"     && (upgradeMaxHP15 || upgradeMaxHP20)) return;
  if(item.id === "maxHP20"     && upgradeMaxHP20)      return;
  if(item.id === "fireRate"    && upgradeFireRate)     return;
  if(item.id === "speedBoost"  && upgradeSpeedBoost)   return;

  money -= item.cost;

  if(item.id === "tripleShot"){
    upgradeTripleShot = true;
    tripleShotUnlocked = true;
  }
  if(item.id === "maxHP15"){
    upgradeMaxHP15 = true;
    maxLives = 15; lives = 15;
    if(gameMode === "coop"){ p2MaxLives = 15; p2Lives = Math.min(p2Lives+5,15); }
  }
  if(item.id === "maxHP20"){
    upgradeMaxHP20 = true;
    maxLives = 20; lives = 20;
    if(gameMode === "coop"){ p2MaxLives = 20; p2Lives = 20; }
  }
  if(item.id === "fireRate"){
    upgradeFireRate = true;
  }
  if(item.id === "speedBoost"){
    upgradeSpeedBoost = true;
    ship.thrust = 0.14;
    if(gameMode === "coop") p2Thrust = 0.14;
  }
}

window.addEventListener("keydown", e => {
  if((e.key === "b" || e.key === "B") && !dead && gameMode !== null){
    shopOpen = !shopOpen;
  }
  if(gameMode !== null) handleShopPurchase(e.key);
});

/* TIMERS */
let startTime = Date.now();
let respawnTimer = Date.now();
let respawnUnlocked = false;
let tripleShotUnlocked = false;

/* BOSS 1 */
let boss = null;
let bossSpawned = false;
let bossBullets = [];
let bossShootCooldown = 0;

/* BOSS 2 */
let boss2 = null;
let boss2Spawned = false;
let boss2Bullets = [];
let boss2ShootCooldown = 0;
let boss2MinionCooldown = 0;

/* BOSS 3 */
let boss3 = null;
let boss3Spawned = false;
let boss3Bullets = [];
let boss3ShootCooldown = 0;
let boss3MinionCooldown = 0;

/* BIG GUNS */
const bigGuns = [];
let bigGunUnlocked = false;
let bigGunSpawnCooldown = 0;

/* WORLD */
let worldX = 0;
let worldY = 0;
const friction = 0.999;

/* PLANETS */
const planets = [
  {x:0, y:0, r:70, atm:140, color:"blue"},
  {x:2000, y:-1200, r:60, atm:130, color:"green"},
  {x:-2200, y:1500, r:65, atm:135, color:"purple"}
];

function placeOnPlanet(p){
  worldX = p.x;
  worldY = p.y - p.r;
  ship.vx = 0;
  ship.vy = 0;
  ship.stuck = true;
}
/* P1 spawns at -0.25 rad offset from top so players start beside each other */
{
  const a = -Math.PI / 2 - 0.25;
  worldX = planets[0].x + Math.cos(a) * planets[0].r;
  worldY = planets[0].y + Math.sin(a) * planets[0].r;
  ship.vx = 0; ship.vy = 0; ship.stuck = true;
}

/* ═══════════════════════════════════════════════════════════
   P2 STATE  (coop only)
   P2 controls: ArrowLeft/Right = rotate, ArrowUp = thrust, ArrowDown = shoot
═══════════════════════════════════════════════════════════ */
let p2WorldX = 0, p2WorldY = 0;
let p2Vx = 0, p2Vy = 0;
let p2Angle = 0;
let p2Stuck = true;
let p2Thrust = 0.1;
let p2Lives = 10, p2MaxLives = 10;
let p2Kills = 0;
let p2Dead = false;
let p2RespawnTimer = 0;  // counts down in frames
let p2ShootCooldown = 0;
const p2Bullets = [];    // world-space bullets for P2
const coopParticles = []; // world-space thrust particles for coop mode

function placeP2OnPlanet(p){
  /* spawn on planet surface at +0.25 rad offset from top so P2 is beside P1 */
  const a = -Math.PI / 2 + 0.25;
  p2WorldX = p.x + Math.cos(a) * p.r;
  p2WorldY = p.y + Math.sin(a) * p.r;
  p2Vx = 0; p2Vy = 0;
  p2Stuck = true;
}

function resetP2(){
  placeP2OnPlanet(planets[0]);
  p2Angle = 0; p2Thrust = upgradeSpeedBoost ? 0.14 : 0.1;
  p2Lives = maxLives; p2MaxLives = maxLives;
  p2Kills = 0; p2Dead = false; p2RespawnTimer = 0;
  p2ShootCooldown = 0;
  p2Bullets.length = 0;
  coopParticles.length = 0;
}

function initCoop(){
  resetP2();
}

/* ═══════════════════════════════════════════════════════════
   NEAREST PLAYER HELPER  (for enemy/boss targeting in coop)
═══════════════════════════════════════════════════════════ */
function nearestPlayerPos(ex, ey){
  if(gameMode !== "coop" || p2Dead) return {x: worldX, y: worldY};
  if(dead) return {x: p2WorldX, y: p2WorldY};
  const d1 = Math.hypot(worldX  - ex, worldY  - ey);
  const d2 = Math.hypot(p2WorldX - ex, p2WorldY - ey);
  return d1 <= d2 ? {x: worldX, y: worldY} : {x: p2WorldX, y: p2WorldY};
}

/* STARS */
const stars = [];
for(let i=0;i<400;i++){
  stars.push({
    x:Math.random()*10000-5000,
    y:Math.random()*10000-5000,
    size:Math.random()*2+0.5,
    depth:Math.random()*0.6+0.4
  });
}

/* PARTICLES  (screen-space, solo mode) */
const particles = [];
class Particle{
  constructor(x,y,angle){
    this.x=x; this.y=y;
    this.vx=Math.cos(angle+Math.PI)*(Math.random()*2+1);
    this.vy=Math.sin(angle+Math.PI)*(Math.random()*2+1);
    this.life=30;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; }
  draw(){ ctx.fillStyle="orange"; ctx.fillRect(this.x,this.y,3,3); }
}

/* BULLETS (P1) */
const bullets = [];
let shootCooldown = 0;

class Bullet{
  constructor(x,y,angle){
    const speed = 6;
    this.x=x; this.y=y;
    this.vx=Math.cos(angle)*speed + ship.vx;
    this.vy=Math.sin(angle)*speed + ship.vy;
    this.life=80;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; }
}

/* ENEMIES */
const enemies = [];

function spawnEnemyAtPlanet(planet){
  enemies.push({
    x: planet.x + Math.random()*planet.r - planet.r/2,
    y: planet.y + Math.random()*planet.r - planet.r/2,
    vx:0, vy:0, angle:0, active:false, alive:true, hp:10, maxHp:10
  });
}

function spawnEnemies(planet, count){
  for(let i=0;i<count;i++) spawnEnemyAtPlanet(planet);
}

spawnEnemies(planets[1],5);
spawnEnemies(planets[2],5);

const enemyBullets = [];

/* BIG GUN SPAWN HELPERS */
function spawnBigGun(){
  let angle = Math.random() * Math.PI * 2;
  let dist = 800 + Math.random() * 600;
  bigGuns.push({
    x: worldX + Math.cos(angle)*dist,
    y: worldY + Math.sin(angle)*dist,
    vx:0, vy:0, angle:0, active:false, alive:true, hp:15, maxHp:15,
    shootCooldown: Math.floor(Math.random()*80+60)
  });
}

function spawnBigGunNearBoss2(){
  if(!boss2 || !boss2.alive) return;
  let angle = Math.random() * Math.PI * 2;
  let dist = 120 + Math.random() * 180;
  bigGuns.push({
    x: boss2.x + Math.cos(angle)*dist,
    y: boss2.y + Math.sin(angle)*dist,
    vx:0, vy:0, angle:0, active:false, alive:true, hp:15, maxHp:15,
    shootCooldown: Math.floor(Math.random()*80+40)
  });
}

function spawnEnemyNearBoss3(){
  if(!boss3 || !boss3.alive) return;
  let angle = Math.random() * Math.PI * 2;
  let dist = 150 + Math.random() * 200;
  enemies.push({
    x: boss3.x + Math.cos(angle)*dist,
    y: boss3.y + Math.sin(angle)*dist,
    vx:0, vy:0, angle:0, active:false, alive:true, hp:10, maxHp:10
  });
}

/* ═══════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════ */
function resetGame(){
  lives = 10; kills = 0; dead = false;
  money = 0; maxLives = 10;
  shopOpen = false;
  upgradeTripleShot = false; upgradeFireRate = false;
  upgradeSpeedBoost = false; upgradeMaxHP15 = false; upgradeMaxHP20 = false;
  ship.thrust = 0.1;
  startTime = Date.now(); respawnTimer = Date.now();
  respawnUnlocked = false; tripleShotUnlocked = false;
  enemies.length = 0;
  boss = null; bossSpawned = false; bossBullets = []; bossShootCooldown = 0;
  boss2 = null; boss2Spawned = false; boss2Bullets = []; boss2ShootCooldown = 0; boss2MinionCooldown = 0;
  boss3 = null; boss3Spawned = false; boss3Bullets = []; boss3ShootCooldown = 0; boss3MinionCooldown = 0;
  bigGuns.length = 0; bigGunUnlocked = false; bigGunSpawnCooldown = 0;
  planets.length = 3;
  spawnEnemies(planets[1],5);
  spawnEnemies(planets[2],5);
  /* P1 at -0.25 rad offset from top of planet[0] */
  {
    const a = -Math.PI / 2 - 0.25;
    worldX = planets[0].x + Math.cos(a) * planets[0].r;
    worldY = planets[0].y + Math.sin(a) * planets[0].r;
    ship.vx = 0; ship.vy = 0; ship.stuck = true;
  }
  resetP2();
}

/* ═══════════════════════════════════════════════════════════
   UPDATE  (P1 + shared world – unchanged from V5 except
   coop additions marked with  ← COOP  comments)
═══════════════════════════════════════════════════════════ */
function update(){

  if(keys["r"] || keys["R"]) resetGame();
  if(dead) return;
  if(shopOpen) return;

  if(keys["a"] || keys["A"]) ship.angle-=0.05;
  if(keys["d"] || keys["D"]) ship.angle+=0.05;

  let thrusting=false;

  if((keys["w"] || keys["W"]) && !ship.stuck){
    ship.vx+=Math.cos(ship.angle)*ship.thrust;
    ship.vy+=Math.sin(ship.angle)*ship.thrust;
    thrusting=true;
  }

  if(thrusting){
    particles.push(new Particle(c.width/2,c.height/2,ship.angle));
    /* ← COOP: also push world-space particle so drawViewport can use it */
    if(gameMode === "coop"){
      coopParticles.push({
        x: worldX - Math.cos(ship.angle)*10,
        y: worldY - Math.sin(ship.angle)*10,
        vx: Math.cos(ship.angle+Math.PI)*(Math.random()*2+1),
        vy: Math.sin(ship.angle+Math.PI)*(Math.random()*2+1),
        life:30, maxLife:30
      });
    }
  }

  /* SHOOT – P1 shoots with S */
  let cooldownBase = upgradeFireRate ? 7 : 10;
  if((keys["s"] || keys["S"]) && shootCooldown<=0){
    let offset=10;
    if(tripleShotUnlocked){
      bullets.push(new Bullet(worldX, worldY, ship.angle));
    }
    bullets.push(new Bullet(
      worldX + Math.cos(ship.angle+Math.PI/2)*offset,
      worldY + Math.sin(ship.angle+Math.PI/2)*offset,
      ship.angle
    ));
    bullets.push(new Bullet(
      worldX + Math.cos(ship.angle-Math.PI/2)*offset,
      worldY + Math.sin(ship.angle-Math.PI/2)*offset,
      ship.angle
    ));
    shootCooldown=cooldownBase;
  }
  shootCooldown--;

  /* REGEN */
  if(Date.now() - startTime > 60000 && lives < maxLives){
    if(Math.random() < 0.02){
      lives++;
      if(lives >= maxLives){ lives = maxLives; startTime = Date.now(); }
    }
  }

  /* UNLOCKS */
  if(kills >= 10 && !respawnUnlocked){
    respawnUnlocked = true;
    let big = {x:4000,y:0,r:120,atm:200,color:"orange"};
    planets.push(big);
    spawnEnemies(big,10);
  }

  /* BOSS 1 SPAWN */
  if(kills >= 25 && !bossSpawned){
    bossSpawned = true;
    boss = { x:5000,y:500,vx:0,vy:0,angle:0,hp:200,maxHp:200,alive:true };
  }

  /* BIG GUN UNLOCK */
  if(kills >= 40 && !bigGunUnlocked){ bigGunUnlocked = true; bigGunSpawnCooldown = 0; }
  if(bigGunUnlocked){
    bigGunSpawnCooldown--;
    if(bigGunSpawnCooldown <= 0){
      if(Math.random() < 0.4) spawnBigGun();
      bigGunSpawnCooldown = Math.floor(Math.random()*300+200);
    }
  }

  /* BOSS 2 SPAWN */
  if(kills >= 50 && !boss2Spawned){
    boss2Spawned = true;
    boss2 = { x:-6000,y:-1000,vx:0,vy:0,angle:0,hp:400,maxHp:400,alive:true };
    boss2MinionCooldown = 300;
  }

  /* BOSS 3 SPAWN */
  if(kills >= 90 && !boss3Spawned){
    boss3Spawned = true;
    boss3 = { x:0,y:-8000,vx:0,vy:0,angle:0,hp:400,maxHp:400,alive:true };
    boss3ShootCooldown = 120; boss3MinionCooldown = 1800;
  }

  /* RESPAWN */
  if(respawnUnlocked && Date.now() - respawnTimer > 60000){
    respawnTimer = Date.now();
    for(let p of planets){
      if(p === planets[0]) continue;
      spawnEnemyAtPlanet(p);
    }
  }

  /* GRAVITY (P1) */
  ship.stuck=false;
  for(let p of planets){
    let dx=p.x-worldX; let dy=p.y-worldY;
    let dist=Math.hypot(dx,dy);
    if(dist<p.atm){
      ship.vx+=(dx/dist)*0.02;
      ship.vy+=(dy/dist)*0.02;
      if(dist<p.r){ placeOnPlanet(p); }
    }
  }
  if((keys["w"] || keys["W"]) && ship.stuck){
    ship.stuck=false;
    ship.vx=Math.cos(ship.angle)*2;
    ship.vy=Math.sin(ship.angle)*2;
  }
  if(!ship.stuck){ worldX+=ship.vx; worldY+=ship.vy; }
  ship.vx*=friction; ship.vy*=friction;

  /* PARTICLES update */
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();
    if(particles[i].life<=0) particles.splice(i,1);
  }
  /* ← COOP: update world-space particles */
  for(let i=coopParticles.length-1;i>=0;i--){
    let p=coopParticles[i];
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0) coopParticles.splice(i,1);
  }

  /* P1 BULLETS */
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.update();
    let hit = false;

    for(let e of enemies){
      if(!e.alive) continue;
      if(Math.hypot(b.x-e.x, b.y-e.y)<15){
        e.hp--; bullets.splice(i,1); hit = true;
        if(e.hp<=0){ e.alive=false; kills++; money++; }
        break;
      }
    }
    if(hit) continue;

    for(let bg of bigGuns){
      if(!bg.alive) continue;
      if(Math.hypot(b.x-bg.x, b.y-bg.y)<18){
        bg.hp--; bullets.splice(i,1); hit = true;
        if(bg.hp<=0){ bg.alive=false; kills++; money++; }
        break;
      }
    }
    if(hit) continue;

    if(boss && boss.alive && Math.hypot(b.x-boss.x, b.y-boss.y)<30){
      boss.hp--; bullets.splice(i,1); hit = true;
      if(boss.hp<=0){ boss.alive=false; kills+=15; money+=15; }
    }
    if(hit) continue;

    if(boss2 && boss2.alive && Math.hypot(b.x-boss2.x, b.y-boss2.y)<45){
      boss2.hp--; bullets.splice(i,1); hit = true;
      if(boss2.hp<=0){ boss2.alive=false; kills+=20; money+=20; }
    }
    if(hit) continue;

    if(boss3 && boss3.alive && Math.hypot(b.x-boss3.x, b.y-boss3.y)<60){
      boss3.hp--; bullets.splice(i,1); hit = true;
      if(boss3.hp<=0){ boss3.alive=false; kills+=25; money+=25; }
    }
    if(!hit && b.life<=0) bullets.splice(i,1);
  }

  /* ENEMIES */
  for(let e of enemies){
    if(!e.alive) continue;

    /* ← COOP: activate if visible to either player */
    if(!e.active){
      if(gameMode === "coop"){
        let halfW = c.width/2;
        let ex1=(e.x-worldX)+halfW/2,  ey1=(e.y-worldY)+c.height/2;
        let ex2=(e.x-p2WorldX)+halfW/2, ey2=(e.y-p2WorldY)+c.height/2;
        if((ex1>0&&ex1<halfW&&ey1>0&&ey1<c.height)||
           (!p2Dead&&ex2>0&&ex2<halfW&&ey2>0&&ey2<c.height))
          e.active=true;
      } else {
        let sx=(e.x-worldX)+c.width/2, sy=(e.y-worldY)+c.height/2;
        if(sx>0&&sx<c.width&&sy>0&&sy<c.height) e.active=true;
      }
    }

    if(e.active){
      /* ← COOP: target nearest player */
      let tgt = nearestPlayerPos(e.x, e.y);
      let dx=tgt.x - e.x, dy=tgt.y - e.y;
      let base = Math.atan2(dy,dx);
      let offset = (Math.random()-0.5)*0.5;
      e.angle = base + offset;
      e.vx+=Math.cos(e.angle)*0.1; e.vy+=Math.sin(e.angle)*0.1;
      e.x+=e.vx; e.y+=e.vy;
      e.vx*=0.99; e.vy*=0.99;
      if(Math.random()<0.01){
        enemyBullets.push({
          x:e.x, y:e.y,
          vx:Math.cos(e.angle)*5, vy:Math.sin(e.angle)*5,
          life:120
        });
      }
    }
  }

  /* BIG GUN MOVEMENT + SHOOTING */
  for(let bg of bigGuns){
    if(!bg.alive) continue;

    /* ← COOP: activate if visible to either player */
    if(!bg.active){
      if(gameMode === "coop"){
        let halfW = c.width/2;
        let bx1=(bg.x-worldX)+halfW/2,  by1=(bg.y-worldY)+c.height/2;
        let bx2=(bg.x-p2WorldX)+halfW/2, by2=(bg.y-p2WorldY)+c.height/2;
        if((bx1>0&&bx1<halfW&&by1>0&&by1<c.height)||
           (!p2Dead&&bx2>0&&bx2<halfW&&by2>0&&by2<c.height))
          bg.active=true;
      } else {
        let sx=(bg.x-worldX)+c.width/2, sy=(bg.y-worldY)+c.height/2;
        if(sx>0&&sx<c.width&&sy>0&&sy<c.height) bg.active=true;
      }
    }

    if(bg.active){
      /* ← COOP: target nearest player */
      let tgt = nearestPlayerPos(bg.x, bg.y);
      let dx=tgt.x - bg.x, dy=tgt.y - bg.y;
      let base = Math.atan2(dy,dx);
      bg.angle = base + (Math.random()-0.5)*0.3;
      bg.vx+=Math.cos(bg.angle)*0.04; bg.vy+=Math.sin(bg.angle)*0.04;
      bg.x+=bg.vx; bg.y+=bg.vy;
      bg.vx*=0.98; bg.vy*=0.98;
      bg.shootCooldown--;
      if(bg.shootCooldown <= 0){
        let spread = 0.15;
        enemyBullets.push({ x:bg.x,y:bg.y, vx:Math.cos(bg.angle-spread)*5, vy:Math.sin(bg.angle-spread)*5, life:130 });
        enemyBullets.push({ x:bg.x,y:bg.y, vx:Math.cos(bg.angle+spread)*5, vy:Math.sin(bg.angle+spread)*5, life:130 });
        bg.shootCooldown = Math.floor(Math.random()*60+60);
      }
    }
  }

  /* BOSS 1 MOVEMENT */
  if(boss && boss.alive){
    let tgt = nearestPlayerPos(boss.x, boss.y); /* ← COOP */
    let dx=tgt.x - boss.x, dy=tgt.y - boss.y;
    boss.angle = Math.atan2(dy,dx);
    boss.vx+=Math.cos(boss.angle)*0.05; boss.vy+=Math.sin(boss.angle)*0.05;
    boss.x+=boss.vx; boss.y+=boss.vy;
    boss.vx*=0.99; boss.vy*=0.99;
    bossShootCooldown--;
    if(bossShootCooldown <= 0){
      let spread = 0.25;
      bossBullets.push({ x:boss.x,y:boss.y, vx:Math.cos(boss.angle)*3.5,          vy:Math.sin(boss.angle)*3.5,          life:150 });
      bossBullets.push({ x:boss.x,y:boss.y, vx:Math.cos(boss.angle-spread)*3.5,    vy:Math.sin(boss.angle-spread)*3.5,   life:150 });
      bossBullets.push({ x:boss.x,y:boss.y, vx:Math.cos(boss.angle+spread)*3.5,    vy:Math.sin(boss.angle+spread)*3.5,   life:150 });
      bossShootCooldown = 60;
    }
  }

  /* BOSS 2 MOVEMENT */
  if(boss2 && boss2.alive){
    let tgt = nearestPlayerPos(boss2.x, boss2.y); /* ← COOP */
    let dx=tgt.x - boss2.x, dy=tgt.y - boss2.y;
    boss2.angle = Math.atan2(dy,dx);
    boss2.vx+=Math.cos(boss2.angle)*0.035; boss2.vy+=Math.sin(boss2.angle)*0.035;
    boss2.x+=boss2.vx; boss2.y+=boss2.vy;
    boss2.vx*=0.99; boss2.vy*=0.99;
    boss2ShootCooldown--;
    if(boss2ShootCooldown <= 0){
      let spread = 0.22;
      for(let s=-2;s<=2;s++){
        boss2Bullets.push({ x:boss2.x,y:boss2.y, vx:Math.cos(boss2.angle+spread*s)*3.2, vy:Math.sin(boss2.angle+spread*s)*3.2, life:160 });
      }
      boss2ShootCooldown = 80;
    }
    boss2MinionCooldown--;
    if(boss2MinionCooldown <= 0){ spawnBigGunNearBoss2(); boss2MinionCooldown = Math.floor(Math.random()*180+480); }
  }

  /* BOSS 3 MOVEMENT */
  if(boss3 && boss3.alive){
    let tgt = nearestPlayerPos(boss3.x, boss3.y); /* ← COOP */
    let dx=tgt.x - boss3.x, dy=tgt.y - boss3.y;
    boss3.angle = Math.atan2(dy,dx);
    boss3.vx+=Math.cos(boss3.angle)*0.025; boss3.vy+=Math.sin(boss3.angle)*0.025;
    boss3.x+=boss3.vx; boss3.y+=boss3.vy;
    boss3.vx*=0.99; boss3.vy*=0.99;
    boss3ShootCooldown--;
    if(boss3ShootCooldown <= 0){
      let totalShots=10, maxSpread=0.5;
      for(let s=0;s<totalShots;s++){
        let frac=(s/(totalShots-1))-0.5;
        let sa=boss3.angle+frac*maxSpread;
        boss3Bullets.push({ x:boss3.x,y:boss3.y, vx:Math.cos(sa)*3.0, vy:Math.sin(sa)*3.0, life:170 });
      }
      boss3ShootCooldown = 100;
    }
    boss3MinionCooldown--;
    if(boss3MinionCooldown <= 0){ spawnEnemyNearBoss3(); spawnEnemyNearBoss3(); boss3MinionCooldown = 3600; }
  }

  /* BOSS 1 BULLETS */
  for(let i=bossBullets.length-1;i>=0;i--){
    let b=bossBullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let hit=false;
    if(!dead && Math.hypot(b.x-worldX, b.y-worldY)<15){
      lives--; hit=true; if(lives<=0) dead=true;
    }
    /* ← COOP: also check P2 */
    if(!hit && gameMode==="coop" && !p2Dead && Math.hypot(b.x-p2WorldX, b.y-p2WorldY)<15){
      p2Lives--; hit=true; if(p2Lives<=0){ p2Dead=true; p2RespawnTimer=300; }
    }
    if(hit){ bossBullets.splice(i,1); continue; }
    if(b.life<=0) bossBullets.splice(i,1);
  }

  /* BOSS 2 BULLETS */
  for(let i=boss2Bullets.length-1;i>=0;i--){
    let b=boss2Bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let hit=false;
    if(!dead && Math.hypot(b.x-worldX, b.y-worldY)<15){
      lives--; hit=true; if(lives<=0) dead=true;
    }
    if(!hit && gameMode==="coop" && !p2Dead && Math.hypot(b.x-p2WorldX, b.y-p2WorldY)<15){
      p2Lives--; hit=true; if(p2Lives<=0){ p2Dead=true; p2RespawnTimer=300; }
    }
    if(hit){ boss2Bullets.splice(i,1); continue; }
    if(b.life<=0) boss2Bullets.splice(i,1);
  }

  /* BOSS 3 BULLETS */
  for(let i=boss3Bullets.length-1;i>=0;i--){
    let b=boss3Bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let hit=false;
    if(!dead && Math.hypot(b.x-worldX, b.y-worldY)<15){
      lives--; hit=true; if(lives<=0) dead=true;
    }
    if(!hit && gameMode==="coop" && !p2Dead && Math.hypot(b.x-p2WorldX, b.y-p2WorldY)<15){
      p2Lives--; hit=true; if(p2Lives<=0){ p2Dead=true; p2RespawnTimer=300; }
    }
    if(hit){ boss3Bullets.splice(i,1); continue; }
    if(b.life<=0) boss3Bullets.splice(i,1);
  }

  /* ENEMY BULLETS */
  for(let i=enemyBullets.length-1;i>=0;i--){
    let b=enemyBullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let hit=false;
    if(!dead && Math.hypot(b.x-worldX, b.y-worldY)<15){
      lives--; hit=true; if(lives<=0) dead=true;
    }
    if(!hit && gameMode==="coop" && !p2Dead && Math.hypot(b.x-p2WorldX, b.y-p2WorldY)<15){
      p2Lives--; hit=true; if(p2Lives<=0){ p2Dead=true; p2RespawnTimer=300; }
    }
    if(hit){ enemyBullets.splice(i,1); continue; }
    if(b.life<=0) enemyBullets.splice(i,1);
  }
}

/* ═══════════════════════════════════════════════════════════
   UPDATE P2  (coop only)
   Controls: ArrowLeft/Right = rotate, ArrowUp = thrust, ArrowDown = shoot
═══════════════════════════════════════════════════════════ */
function updateP2(){
  /* P2 respawn */
  if(p2Dead){
    p2RespawnTimer--;
    if(p2RespawnTimer <= 0){
      p2Dead = false;
      p2Lives = p2MaxLives;
      placeP2OnPlanet(planets[0]);
    }
    return;
  }

  /* Rotation – Arrow Left / Right */
  if(keys["ArrowLeft"])  p2Angle -= 0.05;
  if(keys["ArrowRight"]) p2Angle += 0.05;

  /* Thrust – Arrow Up */
  let p2Thrusting = false;
  if(keys["ArrowUp"] && !p2Stuck){
    p2Vx += Math.cos(p2Angle) * p2Thrust;
    p2Vy += Math.sin(p2Angle) * p2Thrust;
    p2Thrusting = true;
  }
  if(p2Thrusting){
    coopParticles.push({
      x: p2WorldX - Math.cos(p2Angle)*10,
      y: p2WorldY - Math.sin(p2Angle)*10,
      vx: Math.cos(p2Angle+Math.PI)*(Math.random()*2+1),
      vy: Math.sin(p2Angle+Math.PI)*(Math.random()*2+1),
      life:30, maxLife:30
    });
  }

  /* Shoot – Arrow Down */
  let p2CD = upgradeFireRate ? 7 : 10;
  if(keys["ArrowDown"] && p2ShootCooldown<=0){
    const speed=6, offset=10;
    const fwd = (x,y) => ({
      vx: Math.cos(p2Angle)*speed + p2Vx,
      vy: Math.sin(p2Angle)*speed + p2Vy
    });
    if(tripleShotUnlocked){
      const v=fwd(); p2Bullets.push({ x:p2WorldX, y:p2WorldY, vx:v.vx, vy:v.vy, life:80 });
    }
    const v=fwd();
    p2Bullets.push({ x:p2WorldX+Math.cos(p2Angle+Math.PI/2)*offset, y:p2WorldY+Math.sin(p2Angle+Math.PI/2)*offset, vx:v.vx, vy:v.vy, life:80 });
    p2Bullets.push({ x:p2WorldX+Math.cos(p2Angle-Math.PI/2)*offset, y:p2WorldY+Math.sin(p2Angle-Math.PI/2)*offset, vx:v.vx, vy:v.vy, life:80 });
    p2ShootCooldown = p2CD;
  }
  p2ShootCooldown--;

  /* Regen */
  if(Date.now() - startTime > 60000 && p2Lives < p2MaxLives){
    if(Math.random() < 0.02){
      p2Lives++;
      if(p2Lives >= p2MaxLives) p2Lives = p2MaxLives;
    }
  }

  /* Gravity + landing */
  p2Stuck = false;
  for(let p of planets){
    let dx=p.x-p2WorldX, dy=p.y-p2WorldY;
    let dist=Math.hypot(dx,dy);
    if(dist<p.atm){
      p2Vx+=(dx/dist)*0.02; p2Vy+=(dy/dist)*0.02;
      if(dist<p.r){ placeP2OnPlanet(p); }
    }
  }
  if(keys["ArrowUp"] && p2Stuck){
    p2Stuck=false; p2Vx=Math.cos(p2Angle)*2; p2Vy=Math.sin(p2Angle)*2;
  }
  if(!p2Stuck){ p2WorldX+=p2Vx; p2WorldY+=p2Vy; }
  p2Vx*=friction; p2Vy*=friction;

  /* P2 bullets – move + collision */
  for(let i=p2Bullets.length-1;i>=0;i--){
    let b=p2Bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let hit=false;

    for(let e of enemies){
      if(!e.alive) continue;
      if(Math.hypot(b.x-e.x,b.y-e.y)<15){
        e.hp--; p2Bullets.splice(i,1); hit=true;
        if(e.hp<=0){ e.alive=false; kills++; money++; p2Kills++; }
        break;
      }
    }
    if(hit) continue;

    for(let bg of bigGuns){
      if(!bg.alive) continue;
      if(Math.hypot(b.x-bg.x,b.y-bg.y)<18){
        bg.hp--; p2Bullets.splice(i,1); hit=true;
        if(bg.hp<=0){ bg.alive=false; kills++; money++; p2Kills++; }
        break;
      }
    }
    if(hit) continue;

    if(boss && boss.alive && Math.hypot(b.x-boss.x,b.y-boss.y)<30){
      boss.hp--; p2Bullets.splice(i,1); hit=true;
      if(boss.hp<=0){ boss.alive=false; kills+=15; money+=15; p2Kills+=15; }
    }
    if(hit) continue;

    if(boss2 && boss2.alive && Math.hypot(b.x-boss2.x,b.y-boss2.y)<45){
      boss2.hp--; p2Bullets.splice(i,1); hit=true;
      if(boss2.hp<=0){ boss2.alive=false; kills+=20; money+=20; p2Kills+=20; }
    }
    if(hit) continue;

    if(boss3 && boss3.alive && Math.hypot(b.x-boss3.x,b.y-boss3.y)<60){
      boss3.hp--; p2Bullets.splice(i,1); hit=true;
      if(boss3.hp<=0){ boss3.alive=false; kills+=25; money+=25; p2Kills+=25; }
    }
    if(!hit && b.life<=0) p2Bullets.splice(i,1);
  }
}

/* ═══════════════════════════════════════════════════════════
   DRAW SHOP  (original – used in solo mode)
═══════════════════════════════════════════════════════════ */
function drawShop(){
  let pw=340, ph=260;
  let px=c.width/2-pw/2, py=c.height/2-ph/2;
  ctx.fillStyle="rgba(0,0,0,0.82)";
  ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle="#ffcc00"; ctx.lineWidth=2;
  ctx.strokeRect(px,py,pw,ph);
  ctx.fillStyle="#ffcc00"; ctx.font="bold 18px monospace";
  ctx.fillText("SHOP  (B = close)", px+18, py+28);
  ctx.font="13px monospace"; ctx.fillStyle="#aaaaaa";
  ctx.fillText("Money: "+money, px+18, py+48);
  let startY=py+72, lineH=36;
  for(let idx=0;idx<SHOP_ITEMS.length;idx++){
    let item=SHOP_ITEMS[idx]; let iy=startY+idx*lineH;
    let owned=false;
    if(item.id==="tripleShot" && upgradeTripleShot) owned=true;
    if(item.id==="maxHP15" && (upgradeMaxHP15||upgradeMaxHP20)) owned=true;
    if(item.id==="maxHP20" && upgradeMaxHP20) owned=true;
    if(item.id==="fireRate" && upgradeFireRate) owned=true;
    if(item.id==="speedBoost" && upgradeSpeedBoost) owned=true;
    let canAfford = money >= item.cost;
    ctx.fillStyle = owned ? "#555555" : (canAfford ? "#00ff88" : "#ff4444");
    ctx.fillText("["+item.key+"]  "+item.label.padEnd(18)+" $"+item.cost+(owned?"  OWNED":""), px+18, iy);
  }
}

/* ═══════════════════════════════════════════════════════════
   DRAW  (original solo mode – completely unchanged)
═══════════════════════════════════════════════════════════ */
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  for(let s of stars){
    let x=(s.x-worldX*s.depth)+c.width/2;
    let y=(s.y-worldY*s.depth)+c.height/2;
    ctx.fillStyle="white";
    ctx.fillRect(x,y,s.size,s.size);
  }

  for(let p of planets){
    let x=(p.x-worldX)+c.width/2;
    let y=(p.y-worldY)+c.height/2;
    ctx.beginPath(); ctx.arc(x,y,p.atm,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=0.1; ctx.fill(); ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(x,y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }

  for(let p of planets){
    let dx=p.x-worldX, dy=p.y-worldY;
    let angle=Math.atan2(dy,dx);
    let dist=Math.min(c.width,c.height)/2-50;
    let x=c.width/2+Math.cos(angle)*dist, y=c.height/2+Math.sin(angle)*dist;
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-12,10); ctx.lineTo(-12,-10);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  if(boss && boss.alive){
    let dx=boss.x-worldX, dy=boss.y-worldY, angle=Math.atan2(dy,dx);
    let dist=Math.min(c.width,c.height)/2-30;
    let x=c.width/2+Math.cos(angle)*dist, y=c.height/2+Math.sin(angle)*dist;
    ctx.fillStyle="yellow"; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  }

  if(boss2 && boss2.alive){
    let dx=boss2.x-worldX, dy=boss2.y-worldY, angle=Math.atan2(dy,dx);
    let dist=Math.min(c.width,c.height)/2-18;
    let x=c.width/2+Math.cos(angle)*dist, y=c.height/2+Math.sin(angle)*dist;
    ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4);
    ctx.fillStyle="#ff00cc"; ctx.fillRect(-6,-6,12,12); ctx.restore();
  }

  if(boss3 && boss3.alive){
    let dx=boss3.x-worldX, dy=boss3.y-worldY, angle=Math.atan2(dy,dx);
    let dist=Math.min(c.width,c.height)/2-8;
    let x=c.width/2+Math.cos(angle)*dist, y=c.height/2+Math.sin(angle)*dist;
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle); ctx.fillStyle="#00ccff";
    ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(-7,6); ctx.lineTo(-7,-6);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  for(let p of particles) p.draw();

  for(let b of bullets){
    let x=(b.x-worldX)+c.width/2, y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="lime"; ctx.fillRect(x,y,4,2);
  }

  for(let e of enemies){
    if(!e.alive) continue;
    let x=(e.x-worldX)+c.width/2, y=(e.y-worldY)+c.height/2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(e.angle);
    ctx.fillStyle="red"; ctx.beginPath();
    ctx.moveTo(15,0); ctx.lineTo(-10,8); ctx.lineTo(-10,-8);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=e.hp/e.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-15,y-25,30,4);
    ctx.fillStyle="lime"; ctx.fillRect(x-15,y-25,30*hr,4);
  }

  for(let bg of bigGuns){
    if(!bg.alive) continue;
    let x=(bg.x-worldX)+c.width/2, y=(bg.y-worldY)+c.height/2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(bg.angle);
    ctx.fillStyle="#ff8800"; ctx.beginPath();
    ctx.moveTo(20,0); ctx.lineTo(-14,11); ctx.lineTo(-14,-11);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#ffcc44"; ctx.fillRect(-6,-4,8,8); ctx.restore();
    let hr=bg.hp/bg.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-18,y-30,36,5);
    ctx.fillStyle="#ff8800"; ctx.fillRect(x-18,y-30,36*hr,5);
  }

  if(boss && boss.alive){
    let x=(boss.x-worldX)+c.width/2, y=(boss.y-worldY)+c.height/2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss.angle);
    ctx.fillStyle="#cc0000"; ctx.beginPath();
    ctx.moveTo(35,0); ctx.lineTo(-25,22); ctx.lineTo(-25,-22);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#ff4444"; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
    let hr=boss.hp/boss.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-40,y-50,80,8);
    ctx.fillStyle="#ff4444"; ctx.fillRect(x-40,y-50,80*hr,8);
  }

  if(boss2 && boss2.alive){
    let x=(boss2.x-worldX)+c.width/2, y=(boss2.y-worldY)+c.height/2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss2.angle);
    ctx.fillStyle="#880088"; ctx.beginPath();
    ctx.moveTo(55,0); ctx.lineTo(-40,35); ctx.lineTo(-40,-35);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#ff00cc"; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle="#ff00cc"; ctx.beginPath();
    ctx.moveTo(20,0); ctx.lineTo(-10,12); ctx.lineTo(-10,-12);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=boss2.hp/boss2.maxHp;
    ctx.fillStyle="#440044"; ctx.fillRect(x-60,y-70,120,10);
    ctx.fillStyle="#ff00cc"; ctx.fillRect(x-60,y-70,120*hr,10);
    ctx.strokeStyle="#ff00cc"; ctx.lineWidth=1; ctx.strokeRect(x-60,y-70,120,10);
  }

  if(boss3 && boss3.alive){
    let x=(boss3.x-worldX)+c.width/2, y=(boss3.y-worldY)+c.height/2;
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss3.angle);
    ctx.fillStyle="#004466"; ctx.beginPath();
    ctx.moveTo(80,0); ctx.lineTo(-60,50); ctx.lineTo(-60,-50);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#00ccff"; ctx.lineWidth=4; ctx.stroke();
    ctx.fillStyle="#00ccff"; ctx.beginPath();
    ctx.moveTo(35,0); ctx.lineTo(-20,18); ctx.lineTo(-20,-18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#004466"; ctx.beginPath();
    ctx.moveTo(15,0); ctx.lineTo(-8,8); ctx.lineTo(-8,-8);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=boss3.hp/boss3.maxHp;
    ctx.fillStyle="#002233"; ctx.fillRect(x-80,y-90,160,12);
    ctx.fillStyle="#00ccff"; ctx.fillRect(x-80,y-90,160*hr,12);
    ctx.strokeStyle="#00ccff"; ctx.lineWidth=1; ctx.strokeRect(x-80,y-90,160,12);
  }

  for(let b of enemyBullets){
    let x=(b.x-worldX)+c.width/2, y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="red"; ctx.fillRect(x,y,4,4);
  }
  for(let b of bossBullets){
    let x=(b.x-worldX)+c.width/2, y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="yellow"; ctx.fillRect(x,y,5,5);
  }
  for(let b of boss2Bullets){
    let x=(b.x-worldX)+c.width/2, y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="#ff00cc"; ctx.fillRect(x,y,6,6);
  }
  for(let b of boss3Bullets){
    let x=(b.x-worldX)+c.width/2, y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="#00ccff"; ctx.fillRect(x,y,6,6);
  }

  if(!dead){
    ctx.save();
    ctx.translate(c.width/2,c.height/2); ctx.rotate(ship.angle);
    ctx.fillStyle="white"; ctx.beginPath();
    ctx.moveTo(18,0); ctx.lineTo(-12,10); ctx.lineTo(-8,0); ctx.lineTo(-12,-10);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  ctx.font="14px monospace";
  ctx.fillStyle="white";  ctx.fillText("Lives: "+lives+" / "+maxLives, 20, 30);
  ctx.fillStyle="white";  ctx.fillText("Kills: "+kills, 20, 50);
  ctx.fillStyle="#ffcc00"; ctx.fillText("Money: $"+money, 20, 70);
  ctx.fillStyle="#aaaaaa"; ctx.fillText("B = Shop", 20, 90);

  if(shopOpen) drawShop();

  if(dead){
    ctx.fillStyle="white"; ctx.font="16px monospace";
    ctx.fillText("Press R to Restart", c.width/2-90, c.height/2);
  }
}

/* ═══════════════════════════════════════════════════════════
   DRAW VIEWPORT  (coop split-screen renderer)

   Clips to the given rectangle and renders the entire world
   from the given camera position.  Used twice per frame:
     once for P1 (left half) and once for P2 (right half).
═══════════════════════════════════════════════════════════ */
function drawViewport(camX, camY, vpX, vpY, vpW, vpH, isP2){
  const vcx = vpX + vpW/2;   // viewport centre on screen (x)
  const vcy = vpY + vpH/2;   // viewport centre on screen (y)

  /* world → screen for this viewport */
  function ws(wx, wy){
    return [(wx - camX) + vcx, (wy - camY) + vcy];
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(vpX, vpY, vpW, vpH);
  ctx.clip();

  /* Background */
  ctx.fillStyle="black";
  ctx.fillRect(vpX, vpY, vpW, vpH);

  /* Stars (parallax relative to this camera) */
  ctx.fillStyle="white";
  for(let s of stars){
    let x=(s.x - camX*s.depth)+vcx;
    let y=(s.y - camY*s.depth)+vcy;
    if(x<vpX-2||x>vpX+vpW+2||y<vpY-2||y>vpY+vpH+2) continue;
    ctx.fillRect(x, y, s.size, s.size);
  }

  /* Planets */
  for(let p of planets){
    let [x,y]=ws(p.x,p.y);
    ctx.beginPath(); ctx.arc(x,y,p.atm,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=0.1; ctx.fill(); ctx.globalAlpha=1;
    ctx.beginPath(); ctx.arc(x,y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }

  /* Planet direction arrows */
  for(let p of planets){
    let dx=p.x-camX, dy=p.y-camY;
    let angle=Math.atan2(dy,dx);
    let arrowR=Math.min(vpW,vpH)/2-44;
    let ax=vcx+Math.cos(angle)*arrowR, ay=vcy+Math.sin(angle)*arrowR;
    ctx.save(); ctx.translate(ax,ay); ctx.rotate(angle);
    ctx.fillStyle=p.color; ctx.globalAlpha=0.75;
    ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-10,8); ctx.lineTo(-10,-8);
    ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; ctx.restore();
  }

  /* Boss indicators */
  if(boss && boss.alive){
    let dx=boss.x-camX, dy=boss.y-camY, angle=Math.atan2(dy,dx);
    let d=Math.min(vpW,vpH)/2-28;
    let x=vcx+Math.cos(angle)*d, y=vcy+Math.sin(angle)*d;
    ctx.fillStyle="yellow"; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  }
  if(boss2 && boss2.alive){
    let dx=boss2.x-camX, dy=boss2.y-camY, angle=Math.atan2(dy,dx);
    let d=Math.min(vpW,vpH)/2-16;
    let x=vcx+Math.cos(angle)*d, y=vcy+Math.sin(angle)*d;
    ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4);
    ctx.fillStyle="#ff00cc"; ctx.fillRect(-5,-5,10,10); ctx.restore();
  }
  if(boss3 && boss3.alive){
    let dx=boss3.x-camX, dy=boss3.y-camY, angle=Math.atan2(dy,dx);
    let d=Math.min(vpW,vpH)/2-6;
    let x=vcx+Math.cos(angle)*d, y=vcy+Math.sin(angle)*d;
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle); ctx.fillStyle="#00ccff";
    ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-6,5); ctx.lineTo(-6,-5);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  /* World-space coop particles (both thrust trails) */
  for(let p of coopParticles){
    let [x,y]=ws(p.x,p.y);
    if(x<vpX-4||x>vpX+vpW+4||y<vpY-4||y>vpY+vpH+4) continue;
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle="orange"; ctx.fillRect(x,y,3,3);
  }
  ctx.globalAlpha=1;

  /* Enemies */
  for(let e of enemies){
    if(!e.alive) continue;
    let [x,y]=ws(e.x,e.y);
    if(x<vpX-20||x>vpX+vpW+20||y<vpY-20||y>vpY+vpH+20) continue;
    ctx.save(); ctx.translate(x,y); ctx.rotate(e.angle);
    ctx.fillStyle="red"; ctx.beginPath();
    ctx.moveTo(15,0); ctx.lineTo(-10,8); ctx.lineTo(-10,-8);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=e.hp/e.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-15,y-25,30,4);
    ctx.fillStyle="lime"; ctx.fillRect(x-15,y-25,30*hr,4);
  }

  /* Big Guns */
  for(let bg of bigGuns){
    if(!bg.alive) continue;
    let [x,y]=ws(bg.x,bg.y);
    if(x<vpX-25||x>vpX+vpW+25||y<vpY-25||y>vpY+vpH+25) continue;
    ctx.save(); ctx.translate(x,y); ctx.rotate(bg.angle);
    ctx.fillStyle="#ff8800"; ctx.beginPath();
    ctx.moveTo(20,0); ctx.lineTo(-14,11); ctx.lineTo(-14,-11);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#ffcc44"; ctx.fillRect(-6,-4,8,8); ctx.restore();
    let hr=bg.hp/bg.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-18,y-30,36,5);
    ctx.fillStyle="#ff8800"; ctx.fillRect(x-18,y-30,36*hr,5);
  }

  /* Boss 1 */
  if(boss && boss.alive){
    let [x,y]=ws(boss.x,boss.y);
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss.angle);
    ctx.fillStyle="#cc0000"; ctx.beginPath();
    ctx.moveTo(35,0); ctx.lineTo(-25,22); ctx.lineTo(-25,-22);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#ff4444"; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
    let hr=boss.hp/boss.maxHp;
    ctx.fillStyle="red"; ctx.fillRect(x-40,y-50,80,8);
    ctx.fillStyle="#ff4444"; ctx.fillRect(x-40,y-50,80*hr,8);
  }

  /* Boss 2 */
  if(boss2 && boss2.alive){
    let [x,y]=ws(boss2.x,boss2.y);
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss2.angle);
    ctx.fillStyle="#880088"; ctx.beginPath();
    ctx.moveTo(55,0); ctx.lineTo(-40,35); ctx.lineTo(-40,-35);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#ff00cc"; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle="#ff00cc"; ctx.beginPath();
    ctx.moveTo(20,0); ctx.lineTo(-10,12); ctx.lineTo(-10,-12);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=boss2.hp/boss2.maxHp;
    ctx.fillStyle="#440044"; ctx.fillRect(x-60,y-70,120,10);
    ctx.fillStyle="#ff00cc"; ctx.fillRect(x-60,y-70,120*hr,10);
    ctx.strokeStyle="#ff00cc"; ctx.lineWidth=1; ctx.strokeRect(x-60,y-70,120,10);
  }

  /* Boss 3 */
  if(boss3 && boss3.alive){
    let [x,y]=ws(boss3.x,boss3.y);
    ctx.save(); ctx.translate(x,y); ctx.rotate(boss3.angle);
    ctx.fillStyle="#004466"; ctx.beginPath();
    ctx.moveTo(80,0); ctx.lineTo(-60,50); ctx.lineTo(-60,-50);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#00ccff"; ctx.lineWidth=4; ctx.stroke();
    ctx.fillStyle="#00ccff"; ctx.beginPath();
    ctx.moveTo(35,0); ctx.lineTo(-20,18); ctx.lineTo(-20,-18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#004466"; ctx.beginPath();
    ctx.moveTo(15,0); ctx.lineTo(-8,8); ctx.lineTo(-8,-8);
    ctx.closePath(); ctx.fill(); ctx.restore();
    let hr=boss3.hp/boss3.maxHp;
    ctx.fillStyle="#002233"; ctx.fillRect(x-80,y-90,160,12);
    ctx.fillStyle="#00ccff"; ctx.fillRect(x-80,y-90,160*hr,12);
    ctx.strokeStyle="#00ccff"; ctx.lineWidth=1; ctx.strokeRect(x-80,y-90,160,12);
  }

  /* P1 bullets (lime green) */
  for(let b of bullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="lime"; ctx.fillRect(x,y,4,2);
  }

  /* P2 bullets (cyan-blue) */
  for(let b of p2Bullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="#44ccff"; ctx.fillRect(x,y,4,2);
  }

  /* Enemy bullets */
  for(let b of enemyBullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="red"; ctx.fillRect(x,y,4,4);
  }
  for(let b of bossBullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="yellow"; ctx.fillRect(x,y,5,5);
  }
  for(let b of boss2Bullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="#ff00cc"; ctx.fillRect(x,y,6,6);
  }
  for(let b of boss3Bullets){
    let [x,y]=ws(b.x,b.y);
    if(x<vpX-6||x>vpX+vpW+6||y<vpY-6||y>vpY+vpH+6) continue;
    ctx.fillStyle="#00ccff"; ctx.fillRect(x,y,6,6);
  }

  /* Other player's ship */
  let otherX    = isP2 ? worldX   : p2WorldX;
  let otherY    = isP2 ? worldY   : p2WorldY;
  let otherAng  = isP2 ? ship.angle : p2Angle;
  let otherDead = isP2 ? dead     : p2Dead;
  let otherCol  = isP2 ? "white"  : "#44ccff";
  let otherLbl  = isP2 ? "P1"     : "P2";
  let otherHP   = isP2 ? lives    : p2Lives;
  let otherMax  = isP2 ? maxLives : p2MaxLives;
  if(!otherDead){
    let [ox,oy]=ws(otherX, otherY);
    if(ox>vpX-22&&ox<vpX+vpW+22&&oy>vpY-22&&oy<vpY+vpH+22){
      ctx.save(); ctx.translate(ox,oy); ctx.rotate(otherAng);
      ctx.fillStyle=otherCol; ctx.beginPath();
      ctx.moveTo(18,0); ctx.lineTo(-12,10); ctx.lineTo(-8,0); ctx.lineTo(-12,-10);
      ctx.closePath(); ctx.fill(); ctx.restore();
      /* HP bar above other player */
      let ohr = Math.max(0, otherHP/otherMax);
      ctx.fillStyle="#333"; ctx.fillRect(ox-18,oy-30,36,4);
      ctx.fillStyle=otherCol; ctx.fillRect(ox-18,oy-30,36*ohr,4);
      ctx.font="9px monospace"; ctx.fillStyle=otherCol; ctx.textAlign="center";
      ctx.fillText(otherLbl, ox, oy-33); ctx.textAlign="left";
    }
  }

  /* Own ship (always at viewport centre) */
  let myDead  = isP2 ? p2Dead : dead;
  let myAngle = isP2 ? p2Angle : ship.angle;
  let myCol   = isP2 ? "#44ccff" : "white";
  if(!myDead){
    ctx.save(); ctx.translate(vcx,vcy); ctx.rotate(myAngle);
    ctx.fillStyle=myCol; ctx.beginPath();
    ctx.moveTo(18,0); ctx.lineTo(-12,10); ctx.lineTo(-8,0); ctx.lineTo(-12,-10);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  /* ── HUD ── */
  ctx.font="12px monospace";
  let myLbl    = isP2 ? "P2" : "P1";
  let myLives  = isP2 ? p2Lives  : lives;
  let myMax    = isP2 ? p2MaxLives : maxLives;
  let myKills  = isP2 ? p2Kills  : kills;
  let myCtrl   = isP2 ? "↑↓←→ + ↓Shoot" : "W/A/D + S Shoot";
  let hudCol   = isP2 ? "#44ccff" : "white";

  /* HP bar */
  let hpRat = Math.max(0, myLives/myMax);
  let hpCol = hpRat>0.5?"#22cc55":(hpRat>0.25?"#ffaa00":"#ff2222");
  ctx.fillStyle="#330000"; ctx.fillRect(vpX+10,vpY+8,120,8);
  ctx.fillStyle=hpCol;     ctx.fillRect(vpX+10,vpY+8,120*hpRat,8);

  ctx.fillStyle=hudCol;
  ctx.fillText(myLbl+" HP: "+myLives+"/"+myMax, vpX+10, vpY+28);
  ctx.fillStyle="white";
  ctx.fillText("Kills: "+myKills+(isP2?("  (Total:"+kills+")"):""), vpX+10, vpY+44);
  ctx.fillStyle="#ffcc00";
  ctx.fillText("Money: $"+money, vpX+10, vpY+60);
  ctx.fillStyle="#777";
  ctx.fillText(myCtrl, vpX+10, vpY+76);
  if(!isP2){ ctx.fillStyle="#666"; ctx.fillText("B=Shop", vpX+10, vpY+92); }

  /* Shop (P1 viewport only) */
  if(!isP2 && shopOpen) drawShopViewport(vpX, vpY, vpW, vpH);

  /* Dead / respawn messages */
  if(myDead){
    ctx.fillStyle="rgba(0,0,0,0.55)";
    ctx.fillRect(vpX, vpY, vpW, vpH);
    ctx.textAlign="center";
    if(isP2){
      let secs=Math.ceil(p2RespawnTimer/60);
      ctx.font="bold 22px monospace"; ctx.fillStyle="#44ccff";
      ctx.fillText("P2 DOWN", vcx, vcy-14);
      ctx.font="14px monospace"; ctx.fillStyle="#aaa";
      ctx.fillText("Respawning in "+secs+"s…", vcx, vcy+12);
    } else {
      ctx.font="bold 26px monospace"; ctx.fillStyle="#ff3333";
      ctx.fillText("P1 DOWN", vcx, vcy-14);
      ctx.font="14px monospace"; ctx.fillStyle="white";
      ctx.fillText("Press R to Restart", vcx, vcy+12);
    }
    ctx.textAlign="left";
  }

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   DRAW COOP  –  two half-screen viewports + divider
═══════════════════════════════════════════════════════════ */
function drawCoop(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  const halfW = Math.floor(c.width/2);

  /* Left viewport: P1 */
  drawViewport(worldX,   worldY,   0,     0, halfW,            c.height, false);
  /* Right viewport: P2 */
  drawViewport(p2WorldX, p2WorldY, halfW, 0, c.width - halfW,  c.height, true);

  /* Centre divider */
  ctx.strokeStyle="#333"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(halfW,0); ctx.lineTo(halfW,c.height); ctx.stroke();

  /* Co-op label at top centre */
  ctx.fillStyle="#444"; ctx.font="11px monospace"; ctx.textAlign="center";
  ctx.fillText("─── CO-OP ───", c.width/2, 11);
  ctx.textAlign="left";
}

/* ═══════════════════════════════════════════════════════════
   LOOP
═══════════════════════════════════════════════════════════ */
function loop(){
  update();
  updateP2();
  drawCoop();
  requestAnimationFrame(loop);
}
/* Auto-start coop on page load */
initCoop();
loop();
</script>
