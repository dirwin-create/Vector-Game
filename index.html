<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* INPUT */
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

/* SHIP */
const ship = { vx:0, vy:0, angle:0, thrust:0.1, stuck:true };

let lives = 10;
let kills = 0;
let dead = false;

/* MONEY & MAX LIVES */
let money = 0;
let maxLives = 10;

/* SHOP */
let shopOpen = false;
let upgradeTripleShot = false;
let upgradeFireRate  = false;
let upgradeSpeedBoost = false;
let upgradeMaxHP15   = false;
let upgradeMaxHP20   = false;

const SHOP_ITEMS = [
  { key:"1", label:"Triple Shot",    cost:40,  id:"tripleShot" },
  { key:"2", label:"Max HP → 15",    cost:25,  id:"maxHP15"    },
  { key:"3", label:"Max HP → 20",    cost:60,  id:"maxHP20"    },
  { key:"4", label:"Fire Rate +",    cost:20,  id:"fireRate"   },
  { key:"5", label:"Speed Boost",    cost:15,  id:"speedBoost" }
];

function handleShopPurchase(key){
  if(!shopOpen || dead) return;
  const item = SHOP_ITEMS.find(i => i.key === key);
  if(!item) return;
  if(money < item.cost) return;
  if(item.id === "tripleShot"  && upgradeTripleShot)  return;
  if(item.id === "maxHP15"     && (upgradeMaxHP15 || upgradeMaxHP20)) return;
  if(item.id === "maxHP20"     && upgradeMaxHP20)      return;
  if(item.id === "fireRate"    && upgradeFireRate)     return;
  if(item.id === "speedBoost"  && upgradeSpeedBoost)   return;

  money -= item.cost;

  if(item.id === "tripleShot"){
    upgradeTripleShot = true;
    tripleShotUnlocked = true;
  }
  if(item.id === "maxHP15"){
    upgradeMaxHP15 = true;
    maxLives = 15;
    lives = 15;
  }
  if(item.id === "maxHP20"){
    upgradeMaxHP20 = true;
    maxLives = 20;
    lives = 20;
  }
  if(item.id === "fireRate"){
    upgradeFireRate = true;
  }
  if(item.id === "speedBoost"){
    upgradeSpeedBoost = true;
    ship.thrust = 0.14;
  }
}

window.addEventListener("keydown", e => {
  if((e.key === "b" || e.key === "B") && !dead){
    shopOpen = !shopOpen;
  }
  handleShopPurchase(e.key);
});

/* TIMERS */
let startTime = Date.now();
let respawnTimer = Date.now();
let respawnUnlocked = false;
let tripleShotUnlocked = false;

/* BOSS 1 */
let boss = null;
let bossSpawned = false;
let bossBullets = [];
let bossShootCooldown = 0;

/* BOSS 2 */
let boss2 = null;
let boss2Spawned = false;
let boss2Bullets = [];
let boss2ShootCooldown = 0;
let boss2MinionCooldown = 0;

/* BOSS 3 */
let boss3 = null;
let boss3Spawned = false;
let boss3Bullets = [];
let boss3ShootCooldown = 0;
let boss3MinionCooldown = 0;

/* BIG GUNS */
const bigGuns = [];
let bigGunUnlocked = false;
let bigGunSpawnCooldown = 0;

/* WORLD */
let worldX = 0;
let worldY = 0;
const friction = 0.999;

/* PLANETS */
const planets = [
  {x:0, y:0, r:70, atm:140, color:"blue"},
  {x:2000, y:-1200, r:60, atm:130, color:"green"},
  {x:-2200, y:1500, r:65, atm:135, color:"purple"}
];

function placeOnPlanet(p){
  worldX = p.x;
  worldY = p.y - p.r;
  ship.vx = 0;
  ship.vy = 0;
  ship.stuck = true;
}
placeOnPlanet(planets[0]);

/* STARS */
const stars = [];
for(let i=0;i<400;i++){
  stars.push({
    x:Math.random()*10000-5000,
    y:Math.random()*10000-5000,
    size:Math.random()*2+0.5,
    depth:Math.random()*0.6+0.4
  });
}

/* PARTICLES */
const particles = [];
class Particle{
  constructor(x,y,angle){
    this.x=x;
    this.y=y;
    this.vx=Math.cos(angle+Math.PI)*(Math.random()*2+1);
    this.vy=Math.sin(angle+Math.PI)*(Math.random()*2+1);
    this.life=30;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; }
  draw(){ ctx.fillStyle="orange"; ctx.fillRect(this.x,this.y,3,3); }
}

/* BULLETS */
const bullets = [];
let shootCooldown = 0;

class Bullet{
  constructor(x,y,angle){
    const speed = 6;
    this.x=x;
    this.y=y;
    this.vx=Math.cos(angle)*speed + ship.vx;
    this.vy=Math.sin(angle)*speed + ship.vy;
    this.life=80;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.life--; }
}

/* ENEMIES */
const enemies = [];

function spawnEnemyAtPlanet(planet){
  enemies.push({
    x: planet.x + Math.random()*planet.r - planet.r/2,
    y: planet.y + Math.random()*planet.r - planet.r/2,
    vx:0, vy:0,
    angle:0,
    active:false,
    alive:true,
    hp:10,
    maxHp:10
  });
}

function spawnEnemies(planet, count){
  for(let i=0;i<count;i++) spawnEnemyAtPlanet(planet);
}

spawnEnemies(planets[1],5);
spawnEnemies(planets[2],5);

const enemyBullets = [];

/* BIG GUN SPAWN HELPER */
function spawnBigGun(){
  let angle = Math.random() * Math.PI * 2;
  let dist = 800 + Math.random() * 600;
  let spawnX = worldX + Math.cos(angle) * dist;
  let spawnY = worldY + Math.sin(angle) * dist;
  bigGuns.push({
    x: spawnX,
    y: spawnY,
    vx: 0,
    vy: 0,
    angle: 0,
    active: false,
    alive: true,
    hp: 15,
    maxHp: 15,
    shootCooldown: Math.floor(Math.random() * 80 + 60)
  });
}

/* BIG GUN SPAWN FROM BOSS 2 POSITION */
function spawnBigGunNearBoss2(){
  if(!boss2 || !boss2.alive) return;
  let angle = Math.random() * Math.PI * 2;
  let dist = 120 + Math.random() * 180;
  bigGuns.push({
    x: boss2.x + Math.cos(angle) * dist,
    y: boss2.y + Math.sin(angle) * dist,
    vx: 0,
    vy: 0,
    angle: 0,
    active: false,
    alive: true,
    hp: 15,
    maxHp: 15,
    shootCooldown: Math.floor(Math.random() * 80 + 40)
  });
}

/* SMALL RED ENEMY SPAWN FROM BOSS 3 POSITION */
function spawnEnemyNearBoss3(){
  if(!boss3 || !boss3.alive) return;
  let angle = Math.random() * Math.PI * 2;
  let dist = 150 + Math.random() * 200;
  enemies.push({
    x: boss3.x + Math.cos(angle) * dist,
    y: boss3.y + Math.sin(angle) * dist,
    vx: 0,
    vy: 0,
    angle: 0,
    active: false,
    alive: true,
    hp: 10,
    maxHp: 10
  });
}

/* RESET */
function resetGame(){
  lives = 10;
  kills = 0;
  dead = false;
  money = 0;
  maxLives = 10;
  shopOpen = false;
  upgradeTripleShot = false;
  upgradeFireRate   = false;
  upgradeSpeedBoost = false;
  upgradeMaxHP15    = false;
  upgradeMaxHP20    = false;
  ship.thrust = 0.1;
  startTime = Date.now();
  respawnTimer = Date.now();
  respawnUnlocked = false;
  tripleShotUnlocked = false;
  enemies.length = 0;
  boss = null;
  bossSpawned = false;
  bossBullets = [];
  bossShootCooldown = 0;
  boss2 = null;
  boss2Spawned = false;
  boss2Bullets = [];
  boss2ShootCooldown = 0;
  boss2MinionCooldown = 0;
  boss3 = null;
  boss3Spawned = false;
  boss3Bullets = [];
  boss3ShootCooldown = 0;
  boss3MinionCooldown = 0;
  bigGuns.length = 0;
  bigGunUnlocked = false;
  bigGunSpawnCooldown = 0;

  planets.length = 3;

  spawnEnemies(planets[1],5);
  spawnEnemies(planets[2],5);
  placeOnPlanet(planets[0]);
}

/* UPDATE */
function update(){

  if(keys["r"] || keys["R"]) resetGame();
  if(dead) return;
  if(shopOpen) return;

  if(keys["ArrowLeft"]) ship.angle-=0.05;
  if(keys["ArrowRight"]) ship.angle+=0.05;

  let thrusting=false;

  if(keys["ArrowUp"] && !ship.stuck){
    ship.vx+=Math.cos(ship.angle)*ship.thrust;
    ship.vy+=Math.sin(ship.angle)*ship.thrust;
    thrusting=true;
  }

  if(thrusting){
    particles.push(new Particle(c.width/2,c.height/2,ship.angle));
  }

  /* SHOOT */
  let cooldownBase = upgradeFireRate ? 7 : 10;
  if(keys[" "] && shootCooldown<=0){
    let offset=10;

    if(tripleShotUnlocked){
      bullets.push(new Bullet(worldX, worldY, ship.angle));
    }

    bullets.push(new Bullet(
      worldX + Math.cos(ship.angle+Math.PI/2)*offset,
      worldY + Math.sin(ship.angle+Math.PI/2)*offset,
      ship.angle
    ));

    bullets.push(new Bullet(
      worldX + Math.cos(ship.angle-Math.PI/2)*offset,
      worldY + Math.sin(ship.angle-Math.PI/2)*offset,
      ship.angle
    ));

    shootCooldown=cooldownBase;
  }
  shootCooldown--;

  /* ❤️ REGEN AFTER 60s */
  if(Date.now() - startTime > 60000 && lives < maxLives){
    if(Math.random() < 0.02){
      lives++;
      if(lives >= maxLives){
        lives = maxLives;
        startTime = Date.now();
      }
    }
  }

  /* UNLOCKS */
  if(kills >= 10 && !respawnUnlocked){
    respawnUnlocked = true;

    let big = {x:4000,y:0,r:120,atm:200,color:"orange"};
    planets.push(big);
    spawnEnemies(big,10);
  }

  /* 🟡 BOSS 1 SPAWN */
  if(kills >= 25 && !bossSpawned){
    bossSpawned = true;
    boss = {
      x:5000,
      y:500,
      vx:0, vy:0,
      angle:0,
      hp:200,
      maxHp:200,
      alive:true
    };
  }

  /* BIG GUN UNLOCK */
  if(kills >= 40 && !bigGunUnlocked){
    bigGunUnlocked = true;
    bigGunSpawnCooldown = 0;
  }

  /* BIG GUN SPAWNING - low random rate */
  if(bigGunUnlocked){
    bigGunSpawnCooldown--;
    if(bigGunSpawnCooldown <= 0){
      if(Math.random() < 0.4){
        spawnBigGun();
      }
      bigGunSpawnCooldown = Math.floor(Math.random() * 300 + 200);
    }
  }

  /* 🔴 BOSS 2 SPAWN at 50 kills */
  if(kills >= 50 && !boss2Spawned){
    boss2Spawned = true;
    boss2 = {
      x: -6000,
      y: -1000,
      vx:0, vy:0,
      angle:0,
      hp:400,
      maxHp:400,
      alive:true
    };
    boss2MinionCooldown = 300;
  }

  /* 🔵 BOSS 3 SPAWN at 90 kills */
  if(kills >= 90 && !boss3Spawned){
    boss3Spawned = true;
    boss3 = {
      x: 0,
      y: -8000,
      vx:0, vy:0,
      angle:0,
      hp:400,
      maxHp:400,
      alive:true
    };
    boss3ShootCooldown = 120;
    boss3MinionCooldown = 1800;
  }

  /* RESPAWN */
  if(respawnUnlocked && Date.now() - respawnTimer > 60000){
    respawnTimer = Date.now();
    for(let p of planets){
      if(p === planets[0]) continue;
      spawnEnemyAtPlanet(p);
    }
  }

  /* GRAVITY */
  ship.stuck=false;
  for(let p of planets){
    let dx=p.x-worldX;
    let dy=p.y-worldY;
    let dist=Math.hypot(dx,dy);

    if(dist<p.atm){
      let g=0.02;
      ship.vx+=(dx/dist)*g;
      ship.vy+=(dy/dist)*g;

      if(dist<p.r){
        placeOnPlanet(p);
      }
    }
  }

  if(keys["ArrowUp"] && ship.stuck){
    ship.stuck=false;
    ship.vx=Math.cos(ship.angle)*2;
    ship.vy=Math.sin(ship.angle)*2;
  }

  if(!ship.stuck){
    worldX+=ship.vx;
    worldY+=ship.vy;
  }

  ship.vx*=friction;
  ship.vy*=friction;

  /* PARTICLES */
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();
    if(particles[i].life<=0) particles.splice(i,1);
  }

  /* PLAYER BULLETS */
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.update();

    let hit = false;

    for(let e of enemies){
      if(!e.alive) continue;
      let dx=b.x-e.x;
      let dy=b.y-e.y;

      if(Math.hypot(dx,dy)<15){
        e.hp--;
        bullets.splice(i,1);
        hit = true;

        if(e.hp<=0){
          e.alive=false;
          kills++;
          money++;
        }
        break;
      }
    }

    if(hit) continue;

    /* BIG GUN HIT */
    for(let bg of bigGuns){
      if(!bg.alive) continue;
      let dx=b.x-bg.x;
      let dy=b.y-bg.y;

      if(Math.hypot(dx,dy)<18){
        bg.hp--;
        bullets.splice(i,1);
        hit = true;

        if(bg.hp<=0){
          bg.alive=false;
          kills++;
          money++;
        }
        break;
      }
    }

    if(hit) continue;

    /* BOSS 1 HIT */
    if(boss && boss.alive){
      let dx=b.x-boss.x;
      let dy=b.y-boss.y;

      if(Math.hypot(dx,dy)<30){
        boss.hp--;
        bullets.splice(i,1);
        hit = true;

        if(boss.hp<=0){
          boss.alive=false;
          kills+=15;
          money+=15;
        }
      }
    }

    if(hit) continue;

    /* BOSS 2 HIT */
    if(boss2 && boss2.alive){
      let dx=b.x-boss2.x;
      let dy=b.y-boss2.y;

      if(Math.hypot(dx,dy)<45){
        boss2.hp--;
        bullets.splice(i,1);
        hit = true;

        if(boss2.hp<=0){
          boss2.alive=false;
          kills+=20;
          money+=20;
        }
      }
    }

    if(hit) continue;

    /* BOSS 3 HIT */
    if(boss3 && boss3.alive){
      let dx=b.x-boss3.x;
      let dy=b.y-boss3.y;

      if(Math.hypot(dx,dy)<60){
        boss3.hp--;
        bullets.splice(i,1);
        hit = true;

        if(boss3.hp<=0){
          boss3.alive=false;
          kills+=25;
          money+=25;
        }
      }
    }

    if(!hit && b.life<=0) bullets.splice(i,1);
  }

  /* ENEMIES */
  for(let e of enemies){
    if(!e.alive) continue;

    let sx=(e.x-worldX)+c.width/2;
    let sy=(e.y-worldY)+c.height/2;

    if(!e.active && sx>0 && sx<c.width && sy>0 && sy<c.height){
      e.active=true;
    }

    if(e.active){
      let dx=worldX - e.x;
      let dy=worldY - e.y;

      let base = Math.atan2(dy,dx);
      let offset = (Math.random()-0.5)*0.5;
      e.angle = base + offset;

      e.vx+=Math.cos(e.angle)*0.1;
      e.vy+=Math.sin(e.angle)*0.1;

      e.x+=e.vx;
      e.y+=e.vy;

      e.vx*=0.99;
      e.vy*=0.99;

      if(Math.random()<0.01){
        enemyBullets.push({
          x:e.x,
          y:e.y,
          vx:Math.cos(e.angle)*5,
          vy:Math.sin(e.angle)*5,
          life:120
        });
      }
    }
  }

  /* BIG GUN MOVEMENT + SHOOTING */
  for(let bg of bigGuns){
    if(!bg.alive) continue;

    let sx=(bg.x-worldX)+c.width/2;
    let sy=(bg.y-worldY)+c.height/2;

    if(!bg.active && sx>0 && sx<c.width && sy>0 && sy<c.height){
      bg.active=true;
    }

    if(bg.active){
      let dx=worldX - bg.x;
      let dy=worldY - bg.y;

      let base = Math.atan2(dy,dx);
      let offsetAngle = (Math.random()-0.5)*0.3;
      bg.angle = base + offsetAngle;

      bg.vx+=Math.cos(bg.angle)*0.04;
      bg.vy+=Math.sin(bg.angle)*0.04;

      bg.x+=bg.vx;
      bg.y+=bg.vy;

      bg.vx*=0.98;
      bg.vy*=0.98;

      bg.shootCooldown--;
      if(bg.shootCooldown <= 0){
        let spread = 0.15;
        enemyBullets.push({
          x:bg.x, y:bg.y,
          vx:Math.cos(bg.angle - spread)*5,
          vy:Math.sin(bg.angle - spread)*5,
          life:130
        });
        enemyBullets.push({
          x:bg.x, y:bg.y,
          vx:Math.cos(bg.angle + spread)*5,
          vy:Math.sin(bg.angle + spread)*5,
          life:130
        });
        bg.shootCooldown = Math.floor(Math.random() * 60 + 60);
      }
    }
  }

  /* 👾 BOSS 1 MOVEMENT */
  if(boss && boss.alive){
    let dx=worldX - boss.x;
    let dy=worldY - boss.y;

    let base = Math.atan2(dy,dx);
    boss.angle = base;

    boss.vx+=Math.cos(boss.angle)*0.05;
    boss.vy+=Math.sin(boss.angle)*0.05;

    boss.x+=boss.vx;
    boss.y+=boss.vy;

    boss.vx*=0.99;
    boss.vy*=0.99;

    /* BOSS 1 SHOOTS 3 BULLETS IN SPREAD */
    bossShootCooldown--;
    if(bossShootCooldown <= 0){
      let spread = 0.25;
      bossBullets.push({
        x:boss.x, y:boss.y,
        vx:Math.cos(boss.angle)*3.5,
        vy:Math.sin(boss.angle)*3.5,
        life:150
      });
      bossBullets.push({
        x:boss.x, y:boss.y,
        vx:Math.cos(boss.angle - spread)*3.5,
        vy:Math.sin(boss.angle - spread)*3.5,
        life:150
      });
      bossBullets.push({
        x:boss.x, y:boss.y,
        vx:Math.cos(boss.angle + spread)*3.5,
        vy:Math.sin(boss.angle + spread)*3.5,
        life:150
      });
      bossShootCooldown = 60;
    }
  }

  /* 🔴 BOSS 2 MOVEMENT */
  if(boss2 && boss2.alive){
    let dx=worldX - boss2.x;
    let dy=worldY - boss2.y;

    let base = Math.atan2(dy,dx);
    boss2.angle = base;

    boss2.vx+=Math.cos(boss2.angle)*0.035;
    boss2.vy+=Math.sin(boss2.angle)*0.035;

    boss2.x+=boss2.vx;
    boss2.y+=boss2.vy;

    boss2.vx*=0.99;
    boss2.vy*=0.99;

    /* BOSS 2 SHOOTS 5 BULLETS IN WIDE SPREAD */
    boss2ShootCooldown--;
    if(boss2ShootCooldown <= 0){
      let spread = 0.22;
      for(let s=-2; s<=2; s++){
        boss2Bullets.push({
          x:boss2.x, y:boss2.y,
          vx:Math.cos(boss2.angle + spread*s)*3.2,
          vy:Math.sin(boss2.angle + spread*s)*3.2,
          life:160
        });
      }
      boss2ShootCooldown = 80;
    }

    /* BOSS 2 SPAWNS BIG GUN MINIONS - 50% less than before */
    boss2MinionCooldown--;
    if(boss2MinionCooldown <= 0){
      spawnBigGunNearBoss2();
      boss2MinionCooldown = Math.floor(Math.random() * 180 + 480);
    }
  }

  /* 🔵 BOSS 3 MOVEMENT */
  if(boss3 && boss3.alive){
    let dx=worldX - boss3.x;
    let dy=worldY - boss3.y;

    let base = Math.atan2(dy,dx);
    boss3.angle = base;

    boss3.vx+=Math.cos(boss3.angle)*0.025;
    boss3.vy+=Math.sin(boss3.angle)*0.025;

    boss3.x+=boss3.vx;
    boss3.y+=boss3.vy;

    boss3.vx*=0.99;
    boss3.vy*=0.99;

    /* BOSS 3 SHOOTS 10 BULLETS - mostly forward, slight spread */
    boss3ShootCooldown--;
    if(boss3ShootCooldown <= 0){
      let totalShots = 10;
      let maxSpread = 0.5;
      for(let s=0; s<totalShots; s++){
        let frac = (s / (totalShots - 1)) - 0.5;
        let spreadAngle = boss3.angle + frac * maxSpread;
        boss3Bullets.push({
          x:boss3.x, y:boss3.y,
          vx:Math.cos(spreadAngle)*3.0,
          vy:Math.sin(spreadAngle)*3.0,
          life:170
        });
      }
      boss3ShootCooldown = 100;
    }

    /* BOSS 3 SPAWNS 2 SMALL RED ENEMIES EVERY ~60 SECONDS */
    boss3MinionCooldown--;
    if(boss3MinionCooldown <= 0){
      spawnEnemyNearBoss3();
      spawnEnemyNearBoss3();
      boss3MinionCooldown = 3600;
    }
  }

  /* BOSS 1 BULLETS */
  for(let i=bossBullets.length-1;i>=0;i--){
    let b=bossBullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;

    let dx=b.x-worldX;
    let dy=b.y-worldY;

    if(Math.hypot(dx,dy)<15){
      lives--;
      bossBullets.splice(i,1);

      if(lives <= 0){
        dead = true;
      }
      continue;
    }

    if(b.life<=0) bossBullets.splice(i,1);
  }

  /* BOSS 2 BULLETS */
  for(let i=boss2Bullets.length-1;i>=0;i--){
    let b=boss2Bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;

    let dx=b.x-worldX;
    let dy=b.y-worldY;

    if(Math.hypot(dx,dy)<15){
      lives--;
      boss2Bullets.splice(i,1);

      if(lives <= 0){
        dead = true;
      }
      continue;
    }

    if(b.life<=0) boss2Bullets.splice(i,1);
  }

  /* BOSS 3 BULLETS */
  for(let i=boss3Bullets.length-1;i>=0;i--){
    let b=boss3Bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;

    let dx=b.x-worldX;
    let dy=b.y-worldY;

    if(Math.hypot(dx,dy)<15){
      lives--;
      boss3Bullets.splice(i,1);

      if(lives <= 0){
        dead = true;
      }
      continue;
    }

    if(b.life<=0) boss3Bullets.splice(i,1);
  }

  /* ENEMY BULLETS */
  for(let i=enemyBullets.length-1;i>=0;i--){
    let b=enemyBullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    b.life--;

    let dx=b.x-worldX;
    let dy=b.y-worldY;

    if(Math.hypot(dx,dy)<15){
      lives--;
      enemyBullets.splice(i,1);

      if(lives <= 0){
        dead = true;
      }
      continue;
    }

    if(b.life<=0) enemyBullets.splice(i,1);
  }
}

/* DRAW SHOP OVERLAY */
function drawShop(){
  let pw = 340;
  let ph = 260;
  let px = c.width/2 - pw/2;
  let py = c.height/2 - ph/2;

  ctx.fillStyle = "rgba(0,0,0,0.82)";
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = "#ffcc00";
  ctx.lineWidth = 2;
  ctx.strokeRect(px, py, pw, ph);

  ctx.fillStyle = "#ffcc00";
  ctx.font = "bold 18px monospace";
  ctx.fillText("SHOP  (B = close)", px+18, py+28);

  ctx.font = "13px monospace";
  ctx.fillStyle = "#aaaaaa";
  ctx.fillText("Money: " + money, px+18, py+48);

  let startY = py + 72;
  let lineH  = 36;

  for(let idx=0; idx<SHOP_ITEMS.length; idx++){
    let item = SHOP_ITEMS[idx];
    let iy = startY + idx * lineH;

    let owned = false;
    if(item.id === "tripleShot"  && upgradeTripleShot)  owned = true;
    if(item.id === "maxHP15"     && (upgradeMaxHP15 || upgradeMaxHP20)) owned = true;
    if(item.id === "maxHP20"     && upgradeMaxHP20)      owned = true;
    if(item.id === "fireRate"    && upgradeFireRate)     owned = true;
    if(item.id === "speedBoost"  && upgradeSpeedBoost)   owned = true;

    let canAfford = money >= item.cost;

    if(owned){
      ctx.fillStyle = "#555555";
    } else if(canAfford){
      ctx.fillStyle = "#00ff88";
    } else {
      ctx.fillStyle = "#ff4444";
    }

    ctx.fillText(
      "[" + item.key + "]  " + item.label.padEnd(18) + " $" + item.cost + (owned ? "  OWNED" : ""),
      px+18, iy
    );
  }
}

/* DRAW */
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  /* STARS */
  for(let s of stars){
    let x=(s.x-worldX*s.depth)+c.width/2;
    let y=(s.y-worldY*s.depth)+c.height/2;
    ctx.fillStyle="white";
    ctx.fillRect(x,y,s.size,s.size);
  }

  /* PLANETS */
  for(let p of planets){
    let x=(p.x-worldX)+c.width/2;
    let y=(p.y-worldY)+c.height/2;

    ctx.beginPath();
    ctx.arc(x,y,p.atm,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.globalAlpha=0.1;
    ctx.fill();
    ctx.globalAlpha=1;

    ctx.beginPath();
    ctx.arc(x,y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  }

  /* 🔺 PLANET ARROWS */
  for(let p of planets){
    let dx=p.x-worldX;
    let dy=p.y-worldY;
    let angle=Math.atan2(dy,dx);

    let dist=Math.min(c.width,c.height)/2-50;
    let x=c.width/2+Math.cos(angle)*dist;
    let y=c.height/2+Math.sin(angle)*dist;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.fillStyle=p.color;

    ctx.beginPath();
    ctx.moveTo(18,0);
    ctx.lineTo(-12,10);
    ctx.lineTo(-12,-10);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  /* 🟡 BOSS 1 INDICATOR */
  if(boss && boss.alive){
    let dx=boss.x-worldX;
    let dy=boss.y-worldY;
    let angle=Math.atan2(dy,dx);

    let dist=Math.min(c.width,c.height)/2-30;
    let x=c.width/2+Math.cos(angle)*dist;
    let y=c.height/2+Math.sin(angle)*dist;

    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fill();
  }

  /* 🔴 BOSS 2 INDICATOR - magenta diamond */
  if(boss2 && boss2.alive){
    let dx=boss2.x-worldX;
    let dy=boss2.y-worldY;
    let angle=Math.atan2(dy,dx);

    let dist=Math.min(c.width,c.height)/2-18;
    let x=c.width/2+Math.cos(angle)*dist;
    let y=c.height/2+Math.sin(angle)*dist;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(Math.PI/4);
    ctx.fillStyle="#ff00cc";
    ctx.fillRect(-6,-6,12,12);
    ctx.restore();
  }

  /* 🔵 BOSS 3 INDICATOR - cyan triangle pointing inward */
  if(boss3 && boss3.alive){
    let dx=boss3.x-worldX;
    let dy=boss3.y-worldY;
    let angle=Math.atan2(dy,dx);

    let dist=Math.min(c.width,c.height)/2-8;
    let x=c.width/2+Math.cos(angle)*dist;
    let y=c.height/2+Math.sin(angle)*dist;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.fillStyle="#00ccff";
    ctx.beginPath();
    ctx.moveTo(10,0);
    ctx.lineTo(-7,6);
    ctx.lineTo(-7,-6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  for(let p of particles) p.draw();

  for(let b of bullets){
    let x=(b.x-worldX)+c.width/2;
    let y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="lime";
    ctx.fillRect(x,y,4,2);
  }

  /* ENEMIES */
  for(let e of enemies){
    if(!e.alive) continue;
    let x=(e.x-worldX)+c.width/2;
    let y=(e.y-worldY)+c.height/2;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(e.angle);
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(-10,8);
    ctx.lineTo(-10,-8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    let hpRatio = e.hp/e.maxHp;
    ctx.fillStyle="red";
    ctx.fillRect(x-15,y-25,30,4);
    ctx.fillStyle="lime";
    ctx.fillRect(x-15,y-25,30*hpRatio,4);
  }

  /* BIG GUNS */
  for(let bg of bigGuns){
    if(!bg.alive) continue;
    let x=(bg.x-worldX)+c.width/2;
    let y=(bg.y-worldY)+c.height/2;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(bg.angle);
    ctx.fillStyle="#ff8800";
    ctx.beginPath();
    ctx.moveTo(20,0);
    ctx.lineTo(-14,11);
    ctx.lineTo(-14,-11);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle="#ffcc44";
    ctx.fillRect(-6,-4,8,8);
    ctx.restore();

    let hpRatio = bg.hp/bg.maxHp;
    ctx.fillStyle="red";
    ctx.fillRect(x-18,y-30,36,5);
    ctx.fillStyle="#ff8800";
    ctx.fillRect(x-18,y-30,36*hpRatio,5);
  }

  /* 👾 BOSS 1 DRAW - large red triangle */
  if(boss && boss.alive){
    let x=(boss.x-worldX)+c.width/2;
    let y=(boss.y-worldY)+c.height/2;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(boss.angle);
    ctx.fillStyle="#cc0000";
    ctx.beginPath();
    ctx.moveTo(35,0);
    ctx.lineTo(-25,22);
    ctx.lineTo(-25,-22);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle="#ff4444";
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.restore();

    let hpRatio = boss.hp/boss.maxHp;
    ctx.fillStyle="red";
    ctx.fillRect(x-40,y-50,80,8);
    ctx.fillStyle="#ff4444";
    ctx.fillRect(x-40,y-50,80*hpRatio,8);
  }

  /* 🔴 BOSS 2 DRAW - very large magenta triangle */
  if(boss2 && boss2.alive){
    let x=(boss2.x-worldX)+c.width/2;
    let y=(boss2.y-worldY)+c.height/2;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(boss2.angle);
    ctx.fillStyle="#880088";
    ctx.beginPath();
    ctx.moveTo(55,0);
    ctx.lineTo(-40,35);
    ctx.lineTo(-40,-35);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle="#ff00cc";
    ctx.lineWidth=3;
    ctx.stroke();
    ctx.fillStyle="#ff00cc";
    ctx.beginPath();
    ctx.moveTo(20,0);
    ctx.lineTo(-10,12);
    ctx.lineTo(-10,-12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    let hpRatio = boss2.hp/boss2.maxHp;
    ctx.fillStyle="#440044";
    ctx.fillRect(x-60,y-70,120,10);
    ctx.fillStyle="#ff00cc";
    ctx.fillRect(x-60,y-70,120*hpRatio,10);
    ctx.strokeStyle="#ff00cc";
    ctx.lineWidth=1;
    ctx.strokeRect(x-60,y-70,120,10);
  }

  /* 🔵 BOSS 3 DRAW - massive cyan triangle */
  if(boss3 && boss3.alive){
    let x=(boss3.x-worldX)+c.width/2;
    let y=(boss3.y-worldY)+c.height/2;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(boss3.angle);
    ctx.fillStyle="#004466";
    ctx.beginPath();
    ctx.moveTo(80,0);
    ctx.lineTo(-60,50);
    ctx.lineTo(-60,-50);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle="#00ccff";
    ctx.lineWidth=4;
    ctx.stroke();
    ctx.fillStyle="#00ccff";
    ctx.beginPath();
    ctx.moveTo(35,0);
    ctx.lineTo(-20,18);
    ctx.lineTo(-20,-18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle="#004466";
    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(-8,8);
    ctx.lineTo(-8,-8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    let hpRatio = boss3.hp/boss3.maxHp;
    ctx.fillStyle="#002233";
    ctx.fillRect(x-80,y-90,160,12);
    ctx.fillStyle="#00ccff";
    ctx.fillRect(x-80,y-90,160*hpRatio,12);
    ctx.strokeStyle="#00ccff";
    ctx.lineWidth=1;
    ctx.strokeRect(x-80,y-90,160,12);
  }

  /* ENEMY BULLETS */
  for(let b of enemyBullets){
    let x=(b.x-worldX)+c.width/2;
    let y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="red";
    ctx.fillRect(x,y,4,4);
  }

  /* BOSS 1 BULLETS */
  for(let b of bossBullets){
    let x=(b.x-worldX)+c.width/2;
    let y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="yellow";
    ctx.fillRect(x,y,5,5);
  }

  /* BOSS 2 BULLETS - magenta, slightly larger */
  for(let b of boss2Bullets){
    let x=(b.x-worldX)+c.width/2;
    let y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="#ff00cc";
    ctx.fillRect(x,y,6,6);
  }

  /* BOSS 3 BULLETS - cyan */
  for(let b of boss3Bullets){
    let x=(b.x-worldX)+c.width/2;
    let y=(b.y-worldY)+c.height/2;
    ctx.fillStyle="#00ccff";
    ctx.fillRect(x,y,6,6);
  }

  if(!dead){
    ctx.save();
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(ship.angle);

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.moveTo(18,0);
    ctx.lineTo(-12,10);
    ctx.lineTo(-8,0);
    ctx.lineTo(-12,-10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  /* UI */
  ctx.font = "14px monospace";
  ctx.fillStyle="white";
  ctx.fillText("Lives: "+lives+" / "+maxLives, 20, 30);
  ctx.fillText("Kills: "+kills, 20, 50);
  ctx.fillStyle="#ffcc00";
  ctx.fillText("Money: $"+money, 20, 70);
  ctx.fillStyle="#aaaaaa";
  ctx.fillText("B = Shop", 20, 90);

  if(shopOpen) drawShop();

  if(dead){
    ctx.fillStyle="white";
    ctx.font="16px monospace";
    ctx.fillText("Press R to Restart", c.width/2 - 90, c.height/2);
  }
}

/* LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
